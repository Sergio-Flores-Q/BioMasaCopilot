<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BioMasa - Puntos de Retiro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="assets/logo.png" class="logo me-2">BioMasa</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Registrar Cliente</a></li>
        <li class="nav-item"><a class="nav-link active" href="points.html">Puntos de Retiro</a></li>
      </ul>
    </div>
  </nav>

  <main class="container my-4">
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Registrar punto de recolección</h5>
            <form id="pointForm" class="needs-validation" novalidate>
              <div class="mb-2">
                <label class="form-label">Nombre del predio *</label>
                <input id="name" class="form-control" required>
                <div class="invalid-feedback">Ingrese el nombre del predio.</div>
              </div>

              <div class="mb-2">
                <label class="form-label">Dirección / Referencia</label>
                <input id="address" class="form-control">
              </div>

              <div class="mb-2">
                <label class="form-label">Tipo de residuo *</label>
                <select id="wasteType" class="form-select" required>
                  <option value="">Seleccionar</option>
                  <option value="Hojas">Hojas</option>
                  <option value="Ramas">Ramas</option>
                  <option value="Mixto">Mixto</option>
                </select>
                <div class="invalid-feedback">Seleccione un tipo de residuo.</div>
              </div>

              <div class="mb-2">
                <label class="form-label">Estado</label>
                <select id="status" class="form-select">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Retirado">Retirado</option>
                  <option value="Procesado">Procesado</option>
                </select>
              </div>

              <div class="mb-2">
                <label class="form-label">Ubicación geográfica</label>
                <div class="input-group">
                  <input id="lat" class="form-control" placeholder="Lat" readonly>
                  <input id="lng" class="form-control" placeholder="Lng" readonly>
                </div>
                <div class="form-text">Haz clic en el mapa para fijar la ubicación o usa geolocalización.</div>
              </div>

              <div class="d-flex gap-2">
                <button id="saveBtn" class="btn btn-success" type="submit">Guardar punto</button>
                <button id="locateBtn" class="btn btn-outline-secondary" type="button">Usar mi ubicación</button>
                <button id="clearBtn" class="btn btn-outline-danger" type="button">Limpiar</button>
              </div>
            </form>
          </div>
        </div>

        <div class="mt-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0">Filtros</h6>
            <div>
              <select id="filterType" class="form-select form-select-sm">
                <option value="">Todos los tipos</option>
                <option value="Hojas">Hojas</option>
                <option value="Ramas">Ramas</option>
                <option value="Mixto">Mixto</option>
              </select>
            </div>
          </div>

          <div class="table-responsive">
            <table id="pointsTable" class="table table-striped table-sm">
              <thead class="table-success">
                <tr>
                  <th>Nombre</th>
                  <th>Dirección</th>
                  <th>Tipo</th>
                  <th>Estado</th>
                  <th>Lat</th>
                  <th>Lng</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="d-flex gap-2 mt-2">
            <button id="exportCsv" class="btn btn-outline-primary btn-sm">Exportar CSV</button>
            <button id="clearAll" class="btn btn-outline-danger btn-sm">Eliminar todo</button>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div id="map" class="map-card shadow-sm"></div>
      </div>
    </div>
  </main>

  <footer class="text-center py-3 text-muted">© BioMasa</footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/main.js"></script>
  <script src="js/points.js"></script>
</body>
</html>
